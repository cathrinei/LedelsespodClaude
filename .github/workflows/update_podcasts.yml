name: Update Podcasts

on:
  workflow_dispatch:
  schedule:
    - cron: '15 8 * * *'  # 10:15 Oslo-tid (CEST = UTC+2)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install openai

      - name: Hent nye episoder
        run: python update_podcasts.py 2>&1 | tee /tmp/fetch_output.txt

      - name: Vurder nye episoder automatisk
        run: python auto_rate.py 2>&1 | tee /tmp/rate_output.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Oppdater HTML
        run: python embed_csv.py

      - name: Valider data-array i HTML
        run: |
          python - << 'EOF'
          import re, json, sys
          with open("Ledelsepod.html", encoding="utf-8") as f:
              html = f.read()
          m = re.search(r"const data = (\[.*?\]);", html, re.DOTALL)
          if not m:
              print("FEIL: fant ikke data-array i HTML")
              sys.exit(1)
          try:
              data = json.loads(m.group(1))
              print(f"OK: {len(data)} episoder validert i data-array")
          except json.JSONDecodeError as e:
              print(f"FEIL: ugyldig JSON i data-array: {e}")
              sys.exit(1)
          EOF

      - name: Commit og push hvis endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Ledelsepod.csv Ledelsepod.html rejected_episodes.csv failed_attempts.csv
          git diff --cached --quiet || git commit -m "Auto-oppdater episoder $(date +'%Y-%m-%d')"
          git push

      - name: Skriv kjøringssammendrag
        if: always()
        run: |
          echo "## 📻 Episodeoppdatering $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Henting" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/fetch_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vurdering" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/rate_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
