name: Update Podcasts

on:
  workflow_dispatch:
  schedule:
    - cron: '15 8 * * *'  # 10:15 Oslo-tid (CEST = UTC+2)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install openai

      - name: Hent nye episoder
        run: python update_podcasts.py

      - name: Vurder nye episoder automatisk
        run: python auto_rate.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Oppdater HTML
        run: python embed_csv.py

      - name: Commit og push hvis endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Ledelsepod.csv Ledelsepod.html
          git diff --cached --quiet || git commit -m "Auto-oppdater episoder $(date +'%Y-%m-%d')"
          git push
